<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bütçe" />
    <title>Aile Bütçe — Emre & Sıla</title>
    <script>
      // FOUC önleme: kullanıcı tercihini localStorage'dan oku, hemen uygula.
      // SettingsProvider Firestore'dan gelene kadar bu değer geçerli.
      (function () {
        try {
          var stored = localStorage.getItem('theme_preference_v1');
          var theme = stored === 'light' || stored === 'dark' || stored === 'system'
            ? stored
            : 'dark';
          var resolved = theme === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : theme;
          if (resolved === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
